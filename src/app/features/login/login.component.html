<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <div class="logo">
        <i class="pi pi-shopping-cart"></i>
      </div>
      <h1>Bienvenido</h1>
      <p class="subtitle">Ingresa tus credenciales para continuar</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      @if (error()) {
        <div class="error-message">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="field">
        <label for="username">Usuario</label>
        <p-inputGroup>
          <p-inputGroupAddon>
            <i class="pi pi-user"></i>
          </p-inputGroupAddon>
          <input 
            id="username"
            type="text" 
            pInputText 
            [(ngModel)]="username" 
            name="username"
            placeholder="mor_2314"
            [disabled]="loading()"
            required
          />
        </p-inputGroup>
        <small class="help-text">Usuario de prueba: mor_2314</small>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-inputGroup>
          <p-inputGroupAddon>
            <i class="pi pi-lock"></i>
          </p-inputGroupAddon>
          <input 
            id="password"
            type="password"
            pInputText
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [disabled]="loading()"
            required
          />
        </p-inputGroup>
        <small class="help-text">Contraseña de prueba: 83r5^_</small>
      </div>
      <p-button 
        type="submit"
        label="Iniciar Sesión"
        styleClass="login-button"
        [loading]="loading()"
        [disabled]="!username() || !password()"
      ></p-button>

    </form>
  </div>
</div>
