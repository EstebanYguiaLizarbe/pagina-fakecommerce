<header class="navbar">
  <div class="navbar-container">
    <div class="nav-left">
      <button class="nav-brand" (click)="goToProducts()" type="button">
        <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="brand-name">Store</span>
      </button>
    </div>

    <div class="nav-right">
      @if (authService.isAuthenticated()) {
        <button pButton class="nav-button" (click)="onLogout()" type="button" label="Logout"></button>
      }
    </div>
  </div>
</header>
